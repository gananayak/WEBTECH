!<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Page</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: lightgray;
        }

        /* Header */
        header {
            background-color: #f6d44a;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        /* Main Section */
        .container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 50px;
        }

        /* Card */
        .card {
            background-color: #ffffff;
             width: 300px;
            height: 300px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 200px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <img src="https://tse3.mm.bing.net/th/id/OIP.CukDXSevfNa1B9Z7vMf7yQHaEK?pid=Api&P=0&h=180" alt="">
        </div>
        <nav>
            <a href="#">HOME</a>
            <a href="#">ABOUT</a>
            <a href="#">CONTACT</a>
            <a href="#">PROFILE</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://www.apple.com/v/airpods-max/b/images/overview/hero__gnfk5g59t0qe_xlarge.png" alt="">
        </div>

        <div class="card">
            <img src="https://freepngimg.com/thumb/headphones/11-headphones-png-image.png" alt="">
        </div>
    </div>

</body>
</html>
