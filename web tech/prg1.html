<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight:normal;
        }
        nav{
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #558C89;
        }
        #logoblock{
            height: 100px;
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        #footerblock{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:powderblue;
        }

    
      
        #logoblock img{
            height: 140px;
           
        }
        #photoblock{
            height:85vh;
            background-color:wheat;
            display: flex;
            justify-content:space-between;
            align-items: center;

        }
        #left,#right,#leftf{
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 500px;
            width: 500px;
            border-color: white;
            border-radius: 30px;
            box-shadow: 0px 0px 12px rgba(79, 76, 76, 0.7);
            background-color: white;
            flex-direction: column;
            gap: 5px;
            
        }
        #photoblock img{
            height: 500px;
           
        }
    </style>
</head>
<body>
    <nav>
      
            <div id="logoblock">
                <img src="https://download.logo.wine/logo/Uber/Uber-Logo.wine.png" alt="">
            </div>
            
    </nav>
    <br>

    <div id="photoblock">


        <div id="left">
            <img src="https://static.toiimg.com/thumb/msid-98228989,width-400,resizemode-4/98228989.jpg" alt="" width="450px">
             <br><br>
            <input type="text" placeholder="Enter the km"><br><br>
            <button>Submit</button>
        </div>
        
        <div id="right">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnT0E6NelAmIGJ2KQIrz4LvfLwyYjScREL3A&s" alt="" width="450px">
            <br><br>
            <input type="text" placeholder="Enter the km">
            <br><br>
            <button>Submit</button>
        </div>

        <div id="leftf">
                 <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS84gvodspLJxCPCz5sJ_Q_h_ERifl2SNDhMA&s" alt="" width="450px">
                  <br><br>
                   <input type="text" placeholder="Enter the km">
                   <br>
                    <button>Submit</button>
        </div>


    </div>
    
    <div id="footerblock">
        <img src="https://www.pngall.com/wp-content/uploads/2017/05/Copyright-Symbol-PNG-Picture.png" alt="" width="50px" height="50px">

    </div>
</body>
</html>
